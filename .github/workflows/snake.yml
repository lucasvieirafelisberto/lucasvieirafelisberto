# Nome da Action
name: Snake Game

# Quando será executado
on:
  schedule:
    # Executa a cada 5 horas
    - cron: "0 */5 * * *"

  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Faz checkout do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # Gera o snake (VERSÃO ATUALIZADA)
      - name: Gerar animação do Snake
        uses: Platane/snk@v3
        with:
          github_user_name: lucasvieirafelisberto

          # Novo formato (substitui gif_out_path e svg_out_path)
          outputs: |
            dist/github-contribution-grid-snake.svg

      # Publica o resultado no branch "output"
      - name: Publicar no branch output
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
